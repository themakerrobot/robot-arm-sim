<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Arm Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#E9EBED;
  --panel:#F7F8F9;
  --panel2:#FFFFFF;
  --line:#C9CED4;
  --line-soft:#DCE0E4;
  --ink:#1C2530;
  --ink2:#5A6572;
  --ink3:#8B95A1;
  --acc:#E8590C;
  --acc-soft:#FBE4D5;
  --ok:#2F7D4F;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'Archivo','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:13px}
header{background:var(--panel2);border-bottom:1px solid var(--line);padding:0 0 0 16px;display:flex;align-items:center;gap:0;height:46px;flex-shrink:0}
header h1{font-size:13px;color:var(--ink);font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding-right:16px;border-right:1px solid var(--line);height:100%;display:flex;align-items:center}
.badge{font-family:var(--mono);font-size:10px;padding:0 14px;height:100%;display:flex;align-items:center;color:var(--ink3);border-right:1px solid var(--line)}
.badge.ok{color:var(--ok)}
.badge.live{color:var(--acc)}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.left{width:218px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sec{padding:12px;border-bottom:1px solid var(--line-soft)}
.sec-title{font-size:9.5px;text-transform:uppercase;color:var(--ink3);letter-spacing:.16em;margin-bottom:9px;font-weight:600}
.btn-load{width:100%;padding:8px;background:var(--ink);color:#fff;border:none;border-radius:2px;font-size:11.5px;font-weight:600;letter-spacing:.08em;cursor:pointer;margin-top:2px;font-family:var(--sans)}
.btn-load:hover{background:var(--acc)}
.btn-load:disabled{background:var(--line-soft);color:var(--ink3);cursor:not-allowed}
.tb{display:flex;align-items:center;gap:8px;width:100%;padding:6px 9px;background:transparent;border:1px solid transparent;border-radius:2px;color:var(--ink2);font-size:11.5px;cursor:pointer;margin-bottom:2px;transition:all .12s;text-align:left;font-family:var(--sans)}
.tb:hover{background:var(--panel2);border-color:var(--line-soft)}
.tb.on{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
.tb .ic{width:13px;flex-shrink:0;text-align:center;font-size:11px}
.info-row{display:flex;justify-content:space-between;font-size:11px;padding:2.5px 0;color:var(--ink3);font-family:var(--mono)}
.info-val{color:var(--ink)}
.pose-row{display:flex;gap:5px;margin-top:5px}
.pose-btn{flex:1;padding:6px;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink2);font-size:10px;cursor:pointer;text-align:center;transition:all .12s}
.pose-btn:hover{border-color:var(--acc);color:var(--acc)}
input[type=file]{display:none}
.serial-row{display:flex;gap:5px;margin-bottom:6px;align-items:center}
.serial-sel{flex:1;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink);font-size:11px;padding:4px 6px;outline:none;cursor:pointer;font-family:var(--mono)}
.serial-stat{font-size:10px;color:var(--ink3);font-family:var(--mono);margin:5px 0 2px;min-height:13px}
.serial-raw{display:flex;gap:5px;margin-top:6px}
.serial-raw input{flex:1;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink);font-size:11px;padding:4px 6px;outline:none;font-family:var(--mono);min-width:0}
.serial-raw input:focus{border-color:var(--acc)}
.serial-raw button{padding:4px 9px;background:var(--ink);color:#fff;border:none;border-radius:2px;font-size:11px;cursor:pointer}
.serial-raw button:hover{background:var(--acc)}
.serial-log{width:100%;height:90px;margin-top:7px;background:#1C2530;color:#C9E3D4;border:1px solid var(--line);border-radius:2px;font-family:var(--mono);font-size:10px;line-height:1.5;padding:6px;resize:vertical;outline:none;white-space:pre-wrap}
.viewport{flex:1;position:relative;overflow:hidden;background:#DFE2E5}
canvas#cv{display:block;width:100%!important;height:100%!important}
.hud{position:absolute;bottom:10px;left:12px;font-size:10px;color:var(--ink3);pointer-events:none;line-height:1.9;font-family:var(--mono)}
.empty-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none}
.em-icon{font-size:38px;opacity:.2;filter:grayscale(1)}
.em-msg{font-size:12px;color:var(--ink3);line-height:1.8;text-align:center}
.load-overlay{position:absolute;inset:0;background:#E9EBEDee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:14px;color:var(--ink);font-weight:600;letter-spacing:.05em}
.pbar-bg{width:280px;height:3px;background:var(--line)}
.pbar-fill{height:100%;background:var(--acc);transition:width .07s;width:0%}
.pbar-text{font-size:11px;color:var(--ink2);font-family:var(--mono)}
.tooltip{position:absolute;background:var(--ink);border-radius:2px;padding:5px 10px;font-size:11px;color:#fff;pointer-events:none;z-index:100;display:none;font-family:var(--mono)}
.right{width:280px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.right-head{padding:9px 12px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:7px}
.right-head b{font-size:10px;font-weight:600;color:var(--ink2);white-space:nowrap;text-transform:uppercase;letter-spacing:.12em}
.search-box{flex:1;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;padding:4px 8px;color:var(--ink);font-size:11px;outline:none;min-width:0;font-family:var(--mono)}
.search-box::placeholder{color:var(--ink3)}
.search-box:focus{border-color:var(--acc)}
.jcount{font-size:10px;color:var(--ink3);white-space:nowrap;font-family:var(--mono)}
.joints{flex:1;overflow-y:auto;padding:8px}
.no-joint{text-align:center;color:var(--ink3);font-size:11px;padding:40px 16px;line-height:1.8}
.group-header{display:flex;align-items:center;gap:6px;padding:5px 4px;cursor:pointer;color:var(--ink3);font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;user-select:none;margin-top:4px;font-weight:600}
.group-header:hover{color:var(--ink)}
.garr{font-size:8px;transition:transform .15s;flex-shrink:0}
.garr.open{transform:rotate(90deg)}
.group-body{overflow:hidden}
.ji{margin-bottom:4px;background:var(--panel2);border-radius:2px;padding:7px 10px;border:1px solid var(--line-soft);border-left:2px solid var(--line);transition:border-color .12s}
.ji:hover{border-left-color:var(--ink2)}
.ji.highlight{border-color:var(--acc);border-left-color:var(--acc);background:var(--acc-soft)}
.ji-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:4px}
.ji-name{font-size:10.5px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:default;font-family:var(--mono)}
.ji-type{font-size:8.5px;color:var(--ink3);padding:1px 5px;border:1px solid var(--line-soft);border-radius:2px;flex-shrink:0;font-family:var(--mono);text-transform:uppercase}
.ji-val{font-size:11px;color:var(--acc);font-weight:600;min-width:46px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.ji-nudge-grp{display:flex;align-items:center;gap:3px;flex-shrink:0}
.ji-nudge{width:18px;height:18px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink2);font-size:13px;cursor:pointer;font-family:var(--mono);user-select:none}
.ji-nudge:hover{border-color:var(--acc);color:var(--acc)}
.ji-nudge:active{background:var(--acc-soft)}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;appearance:none;background:var(--line);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--panel2);border:2px solid var(--ink);border-radius:50%;transition:border-color .1s}
input[type=range]:hover::-webkit-slider-thumb,input[type=range]:focus::-webkit-slider-thumb{border-color:var(--acc)}
.timeline-panel{height:190px;flex-shrink:0;background:var(--panel);border-top:1px solid var(--line);display:flex;flex-direction:column}
.tl-controls{height:38px;background:var(--panel2);border-bottom:1px solid var(--line-soft);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.tl-btn{padding:4px 9px;background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink2);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s;font-family:var(--sans)}
.tl-btn:hover{border-color:var(--ink2);color:var(--ink)}
.tl-btn.on{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
.tl-btn.accent{background:var(--ink);border-color:var(--ink);color:#fff}
.tl-btn.accent:hover{background:var(--acc);border-color:var(--acc)}
.tl-btn.danger{border-color:#E5B5B5;color:#B33}
.tl-btn.danger:hover{background:#FBEAEA;border-color:#B33}
.tl-sep{width:1px;height:18px;background:var(--line-soft);flex-shrink:0}
.tl-label{font-size:10px;color:var(--ink3);white-space:nowrap;text-transform:uppercase;letter-spacing:.08em}
.tl-select{background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink2);font-size:11px;padding:3px 6px;outline:none;cursor:pointer;font-family:var(--mono)}
.tl-dur{background:var(--panel2);border:1px solid var(--line-soft);border-radius:2px;color:var(--ink);font-size:11px;padding:3px 6px;outline:none;width:52px;text-align:center;font-family:var(--mono)}
.tl-kf-count{font-size:10px;color:var(--ink3);margin-left:auto;white-space:nowrap;font-family:var(--mono)}
.tl-time-display{font-size:11px;color:var(--ink);font-family:var(--mono);min-width:48px;text-align:center;font-weight:600}
.tl-body{flex:1;display:flex;overflow:hidden}
.tl-canvas-wrap{flex:1;position:relative;overflow:hidden}
#tlCanvas{display:block;cursor:crosshair}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
</style>
</head>
<body>
<header>
  <h1>Robot Arm Sim</h1>
  <span class="badge" id="statusBadge">준비</span>
  <span class="badge" id="serialBadge">시리얼: 미연결</span>
</header>

<div class="main">
  <div class="left">

    <!-- ★ 실물 로봇팔 (Web Serial) -->
    <div class="sec">
      <div class="sec-title">실물 연결 (Serial)</div>
      <div class="serial-row">
        <span class="tl-label">Baud</span>
        <select class="serial-sel" id="baudSel">
          <option value="9600" selected>9600</option>
          <option value="57600">57600</option>
          <option value="115200">115200</option>
          <option value="1000000">1000000</option>
        </select>
      </div>
      <button class="btn-load" id="serialBtn">&#x1F50C; 연결 (Connect)</button>
      <div class="serial-stat" id="serialStat">포트 미선택</div>
      <button class="tb" id="liveBtn"><span class="ic">&#x1F4E1;</span>실시간 전송 (Live)</button>
      <button class="tb" id="sendOnceBtn"><span class="ic">&#x25B6;</span>현재 포즈 전송</button>
      <div class="pose-row">
        <button class="pose-btn" id="hwStopBtn">&#x25A0; 정지 (#stop)</button>
        <button class="pose-btn" id="hwPosBtn">&#x21BA; 상태 (#pos)</button>
      </div>
      <div class="serial-raw">
        <input type="text" id="rawCmd" placeholder="직접 명령 (예: #m1:30!)">
        <button id="rawSendBtn">전송</button>
      </div>
      <textarea class="serial-log" id="serialLog" readonly placeholder="시리얼 로그..."></textarea>
    </div>

    <div class="sec">
      <div class="sec-title">뷰</div>
      <button class="tb on" id="gridBtn"><span class="ic">&#x22DE;</span>그리드</button>
      <button class="tb" id="wireBtn"><span class="ic">&#x25A6;</span>와이어</button>
      <button class="tb" id="axisBtn"><span class="ic">&#x2197;</span>관절축</button>
      <button class="tb" id="ssBtn"><span class="ic">&#x1F4F7;</span>스크린샷</button>
    </div>
    <div class="sec">
      <div class="sec-title">포즈</div>
      <button class="tb" id="resetBtn"><span class="ic">&#x21BA;</span>리셋</button>
      <div class="pose-row">
        <button class="pose-btn" id="savePoseBtn">&#x1F4BE; 저장</button>
        <button class="pose-btn" id="loadPoseBtn">&#x1F4C2; 불러오기</button>
      </div>
      <input type="file" id="poseFileIn" accept=".json">
    </div>
    <div class="sec" id="infoSec" style="display:none">
      <div class="sec-title">정보</div>
      <div id="infoRows"></div>
    </div>
  </div>

  <div class="viewport" id="vp">
    <canvas id="cv"></canvas>
    <div class="empty-msg" id="emptyMsg">
      <div class="em-icon">&#x1F916;</div>
      <p class="em-msg">data/ 에서 모델을 불러옵니다<br><span style="font-size:10px;color:#B0B7BE">실패 시 새로고침</span></p>
    </div>
    <div class="load-overlay" id="loadOv" style="display:none">
      <div class="spinner" id="spinner"></div>
      <div class="load-title" id="loadTitle">로딩 중...</div>
      <div class="pbar-bg"><div class="pbar-fill" id="pbar"></div></div>
      <div class="pbar-text" id="ptext">준비 중...</div>
    </div>
    <div class="hud">
      <span id="fpsEl">FPS: --</span>
      <span style="color:#B0B7BE">좌:회전 &nbsp; 우:이동 &nbsp; 휠:줌</span>
    </div>
    <div class="tooltip" id="tt"></div>
  </div>

  <div class="right">
    <div class="right-head">
      <b>관절</b>
      <input class="search-box" id="searchBox" placeholder="검색" type="text">
      <span class="jcount" id="jcount">-</span>
    </div>
    <div class="joints" id="jointsEl">
      <div class="no-joint">URDF 로드 후 관절 표시</div>
    </div>
  </div>
</div>

<div class="timeline-panel">
  <div class="tl-controls">
    <button class="tl-btn" id="tlToStart" title="처음">&#x23EE;</button>
    <button class="tl-btn" id="tlPlayPause" title="재생/정지">&#x25B6;</button>
    <button class="tl-btn" id="tlStop" title="정지">&#x25A0;</button>
    <span class="tl-time-display" id="tlTimeDisp">0.00s</span>
    <div class="tl-sep"></div>
    <button class="tl-btn accent" id="tlAddKf">+ 키프레임</button>
    <button class="tl-btn danger" id="tlDelKf">&#x2715; 삭제</button>
    <div class="tl-sep"></div>
    <span class="tl-label">길이</span>
    <input class="tl-dur" id="tlDurInput" type="number" value="5" min="1" max="60" step="0.5">
    <span class="tl-label">s · 속도</span>
    <select class="tl-select" id="tlSpeedSel">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
    </select>
    <button class="tl-btn" id="tlLoopBtn">&#x1F501; 루프</button>
    <div class="tl-sep"></div>
    <button class="tl-btn" id="tlSaveMotion">&#x1F4BE; 저장</button>
    <button class="tl-btn" id="tlLoadMotion">&#x1F4C2; 불러오기</button>
    <input type="file" id="motionFileIn" accept=".json">
    <span class="tl-kf-count" id="tlKfCount">키프레임 0</span>
  </div>
  <div class="tl-body">
    <div class="tl-canvas-wrap" id="tlWrap">
      <canvas id="tlCanvas"></canvas>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 설정  ★★★ 여기만 보면 됨 ★★★
// ═══════════════════════════════════════════════════════════
// ── data/ 자동 로드 ──
const AUTOLOAD   = true;
const DATA_DIR   = 'data/';
const URDF_NAMES = ['arm4.urdf'];          // data/ 안의 URDF 파일명

// ── 실물 시리얼 (#m:L1,L2,L3,L4!) ──
// 채널 = 가동관절(fixed제외)을 URDF 순서대로 매핑.
//   arm4 기준: [joint1_yaw, joint2_shoulder, joint3_elbow, gripper_joint]
// 서보각 변환:
//   - revolute  : 슬라이더=라디안 → 서보 = 90 + (라디안×180/π) (0 rad = 90°)
//   - prismatic : 슬라이더가 이미 0~180 서보각 → 그대로
const ARM_INVERT = {};                      // 예: { joint2_shoulder:true } (실물 방향 반대축)
const ARM_OFFSET = {};                      // 예: { joint1_yaw: 3 } (서보각 보정 +deg)
const SEND_INTERVAL = 60;                   // ms, 전송 스로틀 (≈16Hz)
const SERIAL_BAUD_DEFAULT = 9600;
const SERIAL_AUTO_RECONNECT = true;         // 이전 허가 포트 자동 재연결

// ═══════════════════════════════════════════════════════════
// ORBIT CONTROLS
// ═══════════════════════════════════════════════════════════
class Orbit {
  constructor(cam, el) {
    this.cam=cam; this.el=el;
    this.target=new THREE.Vector3(0,.8,0);
    this.phi=1.2; this.theta=0.5; this.r=3.5;
    this._dn=false; this._btn=-1; this._lx=0; this._ly=0;
    el.addEventListener('mousedown',e=>{this._dn=true;this._btn=e.button;this._lx=e.clientX;this._ly=e.clientY;});
    window.addEventListener('mousemove',e=>{
      if(!this._dn)return;
      const dx=e.clientX-this._lx,dy=e.clientY-this._ly;
      this._lx=e.clientX;this._ly=e.clientY;
      if(this._btn===0){this.theta-=dx*.005;this.phi=Math.max(.04,Math.min(Math.PI-.04,this.phi-dy*.005));}
      else if(this._btn===2){const f=this.r*.0012;const rt=new THREE.Vector3().setFromMatrixColumn(cam.matrix,0);const up=new THREE.Vector3().setFromMatrixColumn(cam.matrix,1);this.target.addScaledVector(rt,-dx*f).addScaledVector(up,dy*f);}
      this.update();
    });
    window.addEventListener('mouseup',()=>this._dn=false);
    el.addEventListener('wheel',e=>{e.preventDefault();this.r=Math.max(.15,Math.min(60,this.r*(e.deltaY>0?1.1:.9)));this.update();},{passive:false});
    el.addEventListener('contextmenu',e=>e.preventDefault());
    this.update();
  }
  update(){const s=Math.sin(this.phi);this.cam.position.set(this.target.x+this.r*s*Math.sin(this.theta),this.target.y+this.r*Math.cos(this.phi),this.target.z+this.r*s*Math.cos(this.theta));this.cam.lookAt(this.target);}
  focusBox(box){const c=box.getCenter(new THREE.Vector3());const sz=box.getSize(new THREE.Vector3()).length();this.target.copy(c);this.r=sz*1.3;this.update();}
}

// ═══════════════════════════════════════════════════════════
// STL PARSER
// ═══════════════════════════════════════════════════════════
function parseSTL(buf){
  const dv=new DataView(buf);
  if(buf.byteLength<84)return parseASCII(new TextDecoder().decode(buf));
  const n=dv.getUint32(80,true);
  if(Math.abs(buf.byteLength-(84+n*50))<=4)return parseBin(dv,n);
  return parseASCII(new TextDecoder().decode(buf));
}
function parseBin(dv,n){
  const pos=new Float32Array(n*9),nrm=new Float32Array(n*9);let o=84;
  for(let i=0;i<n;i++){
    const nx=dv.getFloat32(o,true),ny=dv.getFloat32(o+4,true),nz=dv.getFloat32(o+8,true);o+=12;
    for(let j=0;j<3;j++){const b=i*9+j*3;pos[b]=dv.getFloat32(o,true);pos[b+1]=dv.getFloat32(o+4,true);pos[b+2]=dv.getFloat32(o+8,true);nrm[b]=nx;nrm[b+1]=ny;nrm[b+2]=nz;o+=12;}
    o+=2;
  }
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('normal',new THREE.BufferAttribute(nrm,3));return g;
}
function parseASCII(txt){
  const pos=[],nrm=[];let nx=0,ny=0,nz=0;
  for(const ln of txt.split('\n')){const l=ln.trim();
    if(l.startsWith('facet normal')){const m=l.match(/normal\s+([\S]+)\s+([\S]+)\s+([\S]+)/);if(m){nx=+m[1];ny=+m[2];nz=+m[3];}}
    else if(l.startsWith('vertex')){const m=l.match(/vertex\s+([\S]+)\s+([\S]+)\s+([\S]+)/);if(m){pos.push(+m[1],+m[2],+m[3]);nrm.push(nx,ny,nz);}}
  }
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));g.setAttribute('normal',new THREE.Float32BufferAttribute(nrm,3));return g;
}

// URDF PARSER
// ═══════════════════════════════════════════════════════════
function parseURDF(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const links={},joints={};
  const mats={};
  doc.querySelectorAll('robot > material').forEach(m=>{
    const c=m.querySelector('color');
    if(c&&m.getAttribute('name'))mats[m.getAttribute('name')]=(c.getAttribute('rgba')||'').split(/\s+/).map(Number);
  });
  function visualColor(v){
    const m=v.querySelector('material');if(!m)return null;
    const c=m.querySelector('color');
    if(c)return (c.getAttribute('rgba')||'').split(/\s+/).map(Number);
    const ref=m.getAttribute('name');
    return (ref&&mats[ref])?mats[ref]:null;
  }
  doc.querySelectorAll('link').forEach(el=>{
    const name=el.getAttribute('name');links[name]={name,visuals:[]};
    el.querySelectorAll('visual').forEach(v=>{
      const me=v.querySelector('geometry mesh');if(!me)return;
      const fn=me.getAttribute('filename')||'';
      const sc=(me.getAttribute('scale')||'1 1 1').split(/\s+/).map(Number);
      links[name].visuals.push({fn,sc,origin:parseOrig(v.querySelector('origin')),rgba:visualColor(v)});
    });
  });
  doc.querySelectorAll('joint').forEach(el=>{
    const name=el.getAttribute('name'),type=el.getAttribute('type')||'fixed';
    const parent=el.querySelector('parent')?.getAttribute('link')||'';
    const child=el.querySelector('child')?.getAttribute('link')||'';
    const axEl=el.querySelector('axis');
    const axis=(axEl?.getAttribute('xyz')||'0 0 1').split(/\s+/).map(Number);
    const lim=el.querySelector('limit');
    const defLo=type==='prismatic'?0:-3.14, defHi=type==='prismatic'?0.05:3.14;
    joints[name]={name,type,parent,child,origin:parseOrig(el.querySelector('origin')),axis,
      limit:{lower:lim?+lim.getAttribute('lower'):defLo,upper:lim?+lim.getAttribute('upper'):defHi}};
  });
  return{links,joints};
}
function parseOrig(el){
  if(!el)return{xyz:[0,0,0],rpy:[0,0,0]};
  return{xyz:(el.getAttribute('xyz')||'0 0 0').split(/\s+/).map(Number),rpy:(el.getAttribute('rpy')||'0 0 0').split(/\s+/).map(Number)};
}
const basename=s=>s.split(/[/\\]/).pop().toLowerCase();
const sid=n=>n.replace(/\W/g,'_');

function jointToServo(jname){
  const sl=sliderEls[jname]; if(!sl)return 90;
  const v=parseFloat(sl.value); const jd=jointDefs[jname];
  let deg;
  if(jd&&jd.type==='prismatic'){ deg=v; }                       // 이미 0~180
  else { deg = 90 + (ARM_INVERT[jname]?-1:1)*v*180/Math.PI; }
  deg += (ARM_OFFSET[jname]||0);
  return Math.round(Math.min(180,Math.max(0,deg)));
}
function buildArmPacket(){
  if(!ARM_JOINTS.length)return null;

function sendArmNow(){ if(!serialConnected)return; const p=buildArmPacket(); if(p)serialWrite(p); }
function liveSendTick(){
  if(!liveSend||!serialConnected)return;

  if(now-lastSendT>=SEND_INTERVAL){lastSendT=now;sendArmNow();}
  else{clearTimeout(pendingSend);pendingSend=setTimeout(()=>{lastSendT=performance.now();sendArmNow();},SEND_INTERVAL);}

async function serialWrite(s){
  if(!serialConnected||!serialWriter)return;
  try{await serialWriter.write(s+'\n');slog('> '+s+'\n');}
  catch(e){slog('[write err] '+e.message+'\n');}
}
function describePort(p){
  try{const i=p.getInfo();
    if(i&&i.usbVendorId!=null){const h=n=>('000'+n.toString(16)).slice(-4).toUpperCase();
      return 'USB VID:'+h(i.usbVendorId)+' PID:'+h(i.usbProductId);}
  }catch(e){}
  return '직렬 포트';
}
async function serialOpen(port){
  const baud=parseInt(document.getElementById('baudSel').value)||SERIAL_BAUD_DEFAULT;
  await port.open({baudRate:baud});
  serialPort=port;
  const enc=new TextEncoderStream();enc.readable.pipeTo(port.writable);
  serialWriter=enc.writable.getWriter();
  const dec=new TextDecoderStream();port.readable.pipeTo(dec.writable);
  serialReader=dec.readable.getReader();
  serialConnected=true;
  document.getElementById('serialStat').textContent=describePort(port)+' · '+baud+'baud';
  const b=document.getElementById('serialBtn');b.textContent='🔌 연결 해제 (Disconnect)';b.style.background='var(--ok)';
  slog('[connected @ '+baud+']\n');
  setSerialBadge();
  readSerialLoop();
}
async function serialConnect(){
  if(serialConnected){await serialDisconnect();return;}
  if(!('serial'in navigator)){alert('이 브라우저는 Web Serial 미지원입니다. 최신 Chrome/Edge를 사용하세요.');return;}
  try{ const port=await navigator.serial.requestPort(); await serialOpen(port); }   // ← 포트 선택창(COM 선택)
  catch(e){slog('[connect err] '+e.message+'\n');}
}
async function readSerialLoop(){
  try{ while(serialConnected){ const {value,done}=await serialReader.read(); if(done)break; if(value)slog(value);} }
  catch(e){slog('[read err] '+e.message+'\n');}
}
async function serialDisconnect(){
  serialConnected=false;liveSend=false;
  document.getElementById('liveBtn').classList.remove('on');
  try{await serialReader?.cancel();}catch(e){}
  try{serialReader?.releaseLock();}catch(e){}
  try{await serialWriter?.close();}catch(e){}
  try{serialWriter?.releaseLock();}catch(e){}
  try{await serialPort?.close();}catch(e){}
  serialPort=serialWriter=serialReader=null;
  document.getElementById('serialStat').textContent='연결 해제됨';
  const b=document.getElementById('serialBtn');b.textContent='🔌 연결 (Connect)';b.style.background='';
  slog('[disconnected]\n');setSerialBadge();
}
async function trySerialAutoReconnect(){
  if(!SERIAL_AUTO_RECONNECT||!('serial'in navigator))return;
  try{ const ports=await navigator.serial.getPorts();
    if(ports.length){ slog('[auto-reconnect] '+describePort(ports[0])+'\n'); await serialOpen(ports[0]); } }
  catch(e){slog('[auto-reconnect err] '+e.message+'\n');}
}

    ptext.innerHTML=msg+'<br><span style="color:#B0B7BE">data/ 경로·네트워크 확인 후 새로고침하세요</span>';

    try{ const r=await fetch(DATA_DIR+nm); if(r.ok){ urdfTxt=await r.text(); urdfName=nm; break; } }catch(e){}
  }
  if(!urdfTxt){ fail('data/ 에서 URDF('+URDF_NAMES.join(', ')+')를 찾지 못했습니다.'); return; }

  let links;
  try{ links=parseURDF(urdfTxt).links; }catch(e){ fail('URDF 파싱 오류: '+e.message); return; }

  const names=new Set();
  for(const l of Object.values(links)) for(const v of l.visuals){ const b=basename(v.fn); if(b) names.add(b); }
  const arr=[...names]; const files=[]; let i=0;
  for(const n of arr){
    ptext.textContent=`STL 받는 중 ${++i}/${arr.length} — ${n}`;
    pbar.style.width=`${(i/arr.length)*100}%`;
    try{ const r=await fetch(DATA_DIR+n); if(r.ok) files.push(new File([await r.blob()], n)); }catch(e){}
    await sleep(0);
  }
  if(!files.length){ fail('data/ 에서 STL을 받지 못했습니다.'); return; }

  urdfFile=new File([urdfTxt], urdfName);
  stlFiles=files;
  ptext.textContent='모델 구성 중...';

}

async function loadRobot(){
  const _lb=document.getElementById('loadBtn'); if(_lb)_lb.disabled=true;
  document.getElementById('loadOv').style.display='flex';
  document.getElementById('emptyMsg').style.display='none';
  isPlaying=false;

    jointObjs={};baseQs={};basePs={};allMeshes=[];allAxes=[];sliderEls={};valEls={};

    const urdfTxt=await readText(urdfFile);
    const{links,joints}=parseURDF(urdfTxt);
    jointDefs=joints;
    ARM_JOINTS=Object.values(joints).filter(j=>j.type!=='fixed').map(j=>j.name); // ★ #m: 채널

    const meshMap={};for(const f of stlFiles)meshMap[f.name.toLowerCase()]=f;
    const childSet=new Set(Object.values(joints).map(j=>j.child));
    const rootName=Object.keys(links).find(l=>!childSet.has(l))||Object.keys(links)[0];

    const needed=new Set();
    for(const l of Object.values(links))for(const v of l.visuals){const b=basename(v.fn);if(meshMap[b])needed.add(b);}

    const geos={};const total=needed.size;let loaded=0;
    const pbar=document.getElementById('pbar'),ptext=document.getElementById('ptext');
    for(const b of needed){
      const geo=parseSTL(await readBuf(meshMap[b]));
      geo.computeVertexNormals();
      geos[b]=geo;
      pbar.style.width=`${(++loaded/total)*100}%`;
      ptext.textContent=`${loaded} / ${total} files`;
      await sleep(0);
    }

    function getColor(n){const k=n.toLowerCase();
      if(k.includes('left')||k.startsWith('l_')||k.includes('_l_')||k.endsWith('_l'))return 0x4fc3f7;
      if(k.includes('right')||k.startsWith('r_')||k.includes('_r_')||k.endsWith('_r'))return 0xf48fb1;
      if(k.includes('head')||k.includes('servo'))return 0xffb74d;
      if(k.includes('hand')||k.includes('finger')||k.includes('palm'))return 0xce93d8;
      if(k.includes('hip')||k.includes('pelvis')||k.includes('waist')||k.includes('torso'))return 0x90a4ae;
      if(k.includes('foot')||k.includes('ankle')||k.includes('knee'))return 0xa5d6a7;
      return 0x78909c;
    }
    function mkLink(lname){
      const link=links[lname];if(!link)return null;
      const grp=new THREE.Group();grp.name='link:'+lname;
      for(const v of link.visuals){const b=basename(v.fn),geo=geos[b];if(!geo)continue;
        const col=v.rgba?new THREE.Color(v.rgba[0],v.rgba[1],v.rgba[2]).getHex():getColor(lname);
        const mat=new THREE.MeshPhongMaterial({color:col,specular:0x111122,shininess:28});
        const mesh=new THREE.Mesh(geo,mat);mesh.userData={linkName:lname};
        mesh.position.set(...v.origin.xyz);mesh.setRotationFromEuler(new THREE.Euler(...v.origin.rpy,'XYZ'));mesh.scale.set(...v.sc);
        allMeshes.push(mesh);grp.add(mesh);}
      const ax=new THREE.AxesHelper(.08);ax.visible=false;allAxes.push(ax);grp.add(ax);
      for(const jt of Object.values(joints).filter(j=>j.parent===lname)){
        const jg=new THREE.Group();jg.name='joint:'+jt.name;
        jg.position.set(...jt.origin.xyz);jg.setRotationFromEuler(new THREE.Euler(...jt.origin.rpy,'XYZ'));
        jointObjs[jt.name]=jg;baseQs[jt.name]=jg.quaternion.clone();
        basePs[jt.name]=jg.position.clone();
        const child=mkLink(jt.child);if(child)jg.add(child);grp.add(jg);}
      return grp;
    }
    robotRoot=mkLink(rootName);
    if(robotRoot){
      robotRoot.rotation.x=-Math.PI/2;
      scene.add(robotRoot);
      const box=new THREE.Box3().setFromObject(robotRoot);
      robotRoot.position.y=-box.min.y;
      orbit.focusBox(new THREE.Box3().setFromObject(robotRoot));
    }
    buildSliders(joints);
    const mv=Object.values(joints).filter(j=>j.type!=='fixed').length;
    document.getElementById('infoSec').style.display='block';
    document.getElementById('infoRows').innerHTML=
      [['링크',Object.keys(links).length],['관절',Object.keys(joints).length],['가동',mv],['메시',allMeshes.length]]
      .map(([k,v])=>`<div class="info-row"><span>${k}</span><span class="info-val">${v}</span></div>`).join('');
    const b=document.getElementById('statusBadge');b.textContent='완료';b.className='badge ok';
    slog('[robot loaded] #m channels = '+ARM_JOINTS.join(', ')+'\n');
  }catch(e){console.error(e);alert('오류 (Error): '+e.message);}
  document.getElementById('loadOv').style.display='none';
  if(_lb)_lb.disabled=false;
}

// JOINT SLIDERS

    const isP=j.type==='prismatic';
    const mn=isP?'0':j.limit.lower.toFixed(4);
    const mx=isP?'180':j.limit.upper.toFixed(4);
    const st=isP?'1':'0.001';
    html+=`<div class="ji" id="ji_${sid(j.name)}" data-joint="${j.name}"><div class="ji-head"><span class="ji-name" title="${j.name}">${j.name}</span><div class="ji-nudge-grp"><button class="ji-nudge" data-joint="${j.name}" data-dir="-1">−</button><span class="ji-val" id="v_${sid(j.name)}">0.0°</span><button class="ji-nudge" data-joint="${j.name}" data-dir="1">+</button></div></div><input type="range" class="jslider" data-joint="${j.name}" min="${mn}" max="${mx}" step="${st}" value="0" id="s_${sid(j.name)}"></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
  el.querySelectorAll('.jslider').forEach(sl=>{
    const jname=sl.dataset.joint;sliderEls[jname]=sl;valEls[jname]=document.getElementById('v_'+sid(jname));
    sl.addEventListener('input',()=>{const v=parseFloat(sl.value);setJointValue(jname,v);valEls[jname].textContent=fmtVal(jname,v);liveSendTick();});
  });
  // ★ −/+ 미세조정 버튼: 클릭 1회 + 길게 누르면 연속
  el.querySelectorAll('.ji-nudge').forEach(btn=>{
    const jn=btn.dataset.joint, dir=parseInt(btn.dataset.dir);
    let iv=null,to=null;
    const start=e=>{e.preventDefault();nudge(jn,dir);to=setTimeout(()=>{iv=setInterval(()=>nudge(jn,dir),60);},350);};
    const stop=()=>{clearTimeout(to);clearInterval(iv);iv=null;to=null;};
    btn.addEventListener('mousedown',start);

function fmtVal(jname,v){
  const jd=jointDefs[jname];
  if(jd&&jd.type==='prismatic'){
    const d=jd.limit.lower+(v/180)*(jd.limit.upper-jd.limit.lower);
    return v.toFixed(0)+'° ('+(d*1000).toFixed(1)+'mm)';
  }
  return (v*180/Math.PI).toFixed(1)+'°';
}
function setJointValue(jname,v){
  const jobj=jointObjs[jname],jdef=jointDefs[jname];if(!jobj||!jdef)return;
  const ax=new THREE.Vector3(...jdef.axis).normalize();
  if(jdef.type==='prismatic'){
    const d=jdef.limit.lower+(v/180)*(jdef.limit.upper-jdef.limit.lower);
    const off=ax.clone().applyQuaternion(baseQs[jname]).multiplyScalar(d);
    jobj.position.copy(basePs[jname]).add(off);
  }else{
    jobj.quaternion.copy(baseQs[jname]).multiply(new THREE.Quaternion().setFromAxisAngle(ax,v));
  }
}
const setAngle=setJointValue;

// ★ 미세조정: revolute=0.1°, prismatic=1
const NUDGE_DEG=0.1;
function nudge(jname,dir){
  const sl=sliderEls[jname]; if(!sl)return;
  const jd=jointDefs[jname];
  const step=(jd&&jd.type==='prismatic')?1:NUDGE_DEG*Math.PI/180;
  let v=parseFloat(sl.value)+dir*step;
  const mn=parseFloat(sl.min),mx=parseFloat(sl.max);
  v=Math.max(mn,Math.min(mx,v));
  sl.value=v;setJointValue(jname,v);
  if(valEls[jname])valEls[jname].textContent=fmtVal(jname,v);
  liveSendTick();
}

function getCurrentPose(){
  const joints={};
  for(const[jname,sl]of Object.entries(sliderEls))joints[jname]=parseFloat(sl.value);

}
function applyPose(joints){
  for(const[jname,val]of Object.entries(joints)){
    setJointValue(jname,val);
    if(sliderEls[jname])sliderEls[jname].value=val;
    if(valEls[jname])valEls[jname].textContent=fmtVal(jname,val);
  }
  liveSendTick();
}
function applyAtTime(t){
  if(!keyframes.length)return;
  const sorted=[...keyframes].sort((a,b)=>a.time-b.time);
  if(sorted.length===1){applyPose(sorted[0].joints);return;}
  if(t<=sorted[0].time){applyPose(sorted[0].joints);return;}
  if(t>=sorted[sorted.length-1].time){applyPose(sorted[sorted.length-1].joints);return;}
  let prev=sorted[0],next=sorted[1];
  for(let i=0;i<sorted.length-1;i++){
    if(sorted[i].time<=t&&sorted[i+1].time>=t){prev=sorted[i];next=sorted[i+1];break;}
  }
  const alpha=next.time===prev.time?1:(t-prev.time)/(next.time-prev.time);
  const ease=alpha*alpha*(3-2*alpha);
  const merged={};
  const allJ=new Set([...Object.keys(prev.joints),...Object.keys(next.joints)]);
  for(const jn of allJ){const a=prev.joints[jn]??0,b=next.joints[jn]??0;merged[jn]=a+(b-a)*ease;}
  applyPose(merged);
}
function addKeyframe(){
  if(!Object.keys(sliderEls).length){alert('로봇을 먼저 로드하세요 (Load robot first)');return;}
  const SNAP=0.05;
  const existing=keyframes.find(k=>Math.abs(k.time-currentTime)<SNAP);
  if(existing){existing.joints=getCurrentPose();selectedKfId=existing.id;}
  else{const kf={id:kfIdCounter++,time:parseFloat(currentTime.toFixed(3)),joints:getCurrentPose()};keyframes.push(kf);selectedKfId=kf.id;}
  updateKfCount();
}
function deleteSelectedKf(){
  if(selectedKfId===null)return;
  keyframes=keyframes.filter(k=>k.id!==selectedKfId);
  selectedKfId=null;updateKfCount();
}
function updateKfCount(){document.getElementById('tlKfCount').textContent=`키프레임 ${keyframes.length}`;}

// TIMELINE CANVAS
const tlCanvas=document.getElementById('tlCanvas');
const tlWrap=document.getElementById('tlWrap');
function resizeTlCanvas(){tlCanvas.width=tlWrap.clientWidth;tlCanvas.height=tlWrap.clientHeight;}
resizeTlCanvas();new ResizeObserver(resizeTlCanvas).observe(tlWrap);
function timeToX(t){return Math.round((t/duration)*tlCanvas.width);}
function xToTime(x){return Math.max(0,Math.min(duration,(x/tlCanvas.width)*duration));}
function drawTimeline(){
  const canvas=tlCanvas,ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  if(W<10||H<10)return;
  const TRACK_Y=0,TRACK_H=H-20;
  ctx.fillStyle='#F7F8F9';ctx.fillRect(0,0,W,H);
  const step=duration<=10?0.5:duration<=30?1:2;
  for(let t=0;t<=duration;t+=step){
    const x=timeToX(t);const isWhole=Math.abs(t%1)<.01;
    ctx.strokeStyle=isWhole?'#C9CED4':'#E2E5E8';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,TRACK_Y);ctx.lineTo(x,TRACK_H);ctx.stroke();
    if(isWhole||duration<=5){ctx.fillStyle='#8B95A1';ctx.font='9px IBM Plex Mono,monospace';ctx.fillText(t.toFixed(1)+'s',x+2,H-5);}
  }
  const endX=timeToX(duration);
  ctx.strokeStyle='#8B95A1';ctx.lineWidth=2;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(endX,TRACK_Y);ctx.lineTo(endX,TRACK_H);ctx.stroke();
  ctx.setLineDash([]);
  const sorted=[...keyframes].sort((a,b)=>a.time-b.time);
  if(sorted.length>=2){
    ctx.strokeStyle='#1C253022';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(timeToX(sorted[0].time),TRACK_H/2);
    for(const kf of sorted.slice(1))ctx.lineTo(timeToX(kf.time),TRACK_H/2);
    ctx.stroke();
  }
  for(const kf of sorted){
    const x=timeToX(kf.time);const sel=kf.id===selectedKfId;const R=sel?9:7;
    ctx.fillStyle=sel?'#E8590C':'#1C2530';
    ctx.beginPath();ctx.moveTo(x,TRACK_H/2-R);ctx.lineTo(x+R,TRACK_H/2);ctx.lineTo(x,TRACK_H/2+R);ctx.lineTo(x-R,TRACK_H/2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=sel?'#E8590C66':'#1C253033';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,TRACK_Y);ctx.lineTo(x,TRACK_H);ctx.stroke();
    ctx.fillStyle=sel?'#E8590C':'#5A6572';ctx.font='9px IBM Plex Mono,monospace';ctx.fillText(kf.time.toFixed(2),x+4,TRACK_H/2-12);
  }
  const px=timeToX(currentTime);
  ctx.strokeStyle='#E8590C';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(px,TRACK_Y);ctx.lineTo(px,TRACK_H);ctx.stroke();
  ctx.fillStyle='#E8590C';
  ctx.beginPath();ctx.moveTo(px-6,TRACK_Y);ctx.lineTo(px+6,TRACK_Y);ctx.lineTo(px,TRACK_Y+10);ctx.closePath();ctx.fill();
}
function getKfAtX(x){return keyframes.find(kf=>Math.abs(timeToX(kf.time)-x)<10)||null;}
tlCanvas.addEventListener('mousedown',e=>{
  const rect=tlCanvas.getBoundingClientRect();const x=e.clientX-rect.left;
  const kf=getKfAtX(x);
  if(kf){selectedKfId=kf.id;tlDragging=true;tlDragKfId=kf.id;applyAtTime(kf.time);currentTime=kf.time;}
  else{tlSeeking=true;currentTime=xToTime(x);if(!isPlaying)applyAtTime(currentTime);}
});
window.addEventListener('mousemove',e=>{
  if(tlDragging&&tlDragKfId!==null){
    const rect=tlCanvas.getBoundingClientRect();const x=e.clientX-rect.left;
    const kf=keyframes.find(k=>k.id===tlDragKfId);
    if(kf){kf.time=parseFloat(xToTime(x).toFixed(3));currentTime=kf.time;if(!isPlaying)applyAtTime(kf.time);}
  } else if(tlSeeking){
    const rect=tlCanvas.getBoundingClientRect();currentTime=xToTime(e.clientX-rect.left);
    if(!isPlaying)applyAtTime(currentTime);
  }
});
window.addEventListener('mouseup',()=>{tlDragging=false;tlDragKfId=null;tlSeeking=false;});
tlCanvas.addEventListener('dblclick',e=>{
  const rect=tlCanvas.getBoundingClientRect();currentTime=xToTime(e.clientX-rect.left);addKeyframe();
});

// TIMELINE CONTROLS
document.getElementById('tlToStart').addEventListener('click',()=>{
  currentTime=0;isPlaying=false;playLastT=null;document.getElementById('tlPlayPause').textContent='▶';applyAtTime(0);
});
document.getElementById('tlPlayPause').addEventListener('click',function(){
  if(!keyframes.length){alert('키프레임을 먼저 추가하세요 (Add a keyframe first)');return;}
  isPlaying=!isPlaying;this.textContent=isPlaying?'⏸':'▶';
  if(isPlaying){playLastT=null;if(currentTime>=duration)currentTime=0;}
});
document.getElementById('tlStop').addEventListener('click',()=>{
  isPlaying=false;playLastT=null;currentTime=0;document.getElementById('tlPlayPause').textContent='▶';applyAtTime(0);
});
document.getElementById('tlAddKf').addEventListener('click',addKeyframe);
document.getElementById('tlDelKf').addEventListener('click',deleteSelectedKf);
document.getElementById('tlDurInput').addEventListener('change',function(){
  duration=Math.max(1,parseFloat(this.value)||5);this.value=duration;if(currentTime>duration)currentTime=duration;
});
document.getElementById('tlSpeedSel').addEventListener('change',function(){playSpeed=parseFloat(this.value);});
document.getElementById('tlLoopBtn').addEventListener('click',function(){loopMode=!loopMode;this.classList.toggle('on',loopMode);});
document.getElementById('tlSaveMotion').addEventListener('click',()=>{
  const data={duration,keyframes};const a=document.createElement('a');a.download='motion.json';
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.click();
});
document.getElementById('tlLoadMotion').addEventListener('click',()=>document.getElementById('motionFileIn').click());
document.getElementById('motionFileIn').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  const data=JSON.parse(await readText(f));
  duration=data.duration||5;document.getElementById('tlDurInput').value=duration;
  keyframes=data.keyframes||[];kfIdCounter=keyframes.reduce((m,k)=>Math.max(m,k.id+1),0);
  updateKfCount();currentTime=0;applyAtTime(0);e.target.value='';
});

// OTHER TOOLS
document.getElementById('gridBtn').addEventListener('click',function(){grid.visible=!grid.visible;this.classList.toggle('on',grid.visible);});
document.getElementById('wireBtn').addEventListener('click',function(){wireMode=!wireMode;this.classList.toggle('on',wireMode);allMeshes.forEach(m=>m.material.wireframe=wireMode);});
document.getElementById('axisBtn').addEventListener('click',function(){axisMode=!axisMode;this.classList.toggle('on',axisMode);allAxes.forEach(a=>a.visible=axisMode);});
document.getElementById('ssBtn').addEventListener('click',()=>{renderer.render(scene,camera);const a=document.createElement('a');a.download='arm_sim.png';a.href=cv.toDataURL('image/png');a.click();});
document.getElementById('resetBtn').addEventListener('click',()=>{
  isPlaying=false;document.getElementById('tlPlayPause').textContent='▶';
  document.querySelectorAll('.jslider').forEach(sl=>{sl.value=0;sl.dispatchEvent(new Event('input'));});
});
document.getElementById('savePoseBtn').addEventListener('click',()=>{
  const pose={};document.querySelectorAll('.jslider').forEach(sl=>{pose[sl.dataset.joint]=parseFloat(sl.value);});
  const a=document.createElement('a');a.download='pose.json';a.href=URL.createObjectURL(new Blob([JSON.stringify(pose,null,2)],{type:'application/json'}));a.click();
});
document.getElementById('loadPoseBtn').addEventListener('click',()=>document.getElementById('poseFileIn').click());
document.getElementById('poseFileIn').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  const pose=JSON.parse(await readText(f));
  Object.entries(pose).forEach(([name,val])=>{const sl=sliderEls[name];if(!sl)return;sl.value=val;sl.dispatchEvent(new Event('input'));});
  e.target.value='';
});

cv.addEventListener('click',e=>{
  if(!allMeshes.length)return;
  const rect=cv.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(allMeshes);
  if(selectedMesh){selectedMesh.material.color.set(selectedOrigColor);selectedMesh=null;}
  document.querySelectorAll('.ji.highlight').forEach(el=>el.classList.remove('highlight'));
  if(!hits.length)return;
  selectedMesh=hits[0].object;selectedOrigColor=selectedMesh.material.color.getHex();
  selectedMesh.material.color.set(0xE8590C);
  const lname=selectedMesh.userData.linkName;
  Object.values(jointDefs).forEach(j=>{
    if(j.child===lname||j.parent===lname){const el=document.getElementById('ji_'+sid(j.name));if(el){el.classList.add('highlight');el.scrollIntoView({block:'nearest',behavior:'smooth'});}}
  });
  const tt=document.getElementById('tt');tt.textContent=lname;tt.style.display='block';
  tt.style.left=(e.clientX-rect.left+10)+'px';tt.style.top=(e.clientY-rect.top+8)+'px';
  setTimeout(()=>tt.style.display='none',2000);
});

// UTILS
function readText(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsText(f);});}
function readBuf(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsArrayBuffer(f);});}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// 페이지 열리면 data/ 자동 로드 + 이전 허가 포트 자동 재연결
if(AUTOLOAD) window.addEventListener('load',autoLoadFromData);
window.addEventListener('load',trySerialAutoReconnect);
</script>
